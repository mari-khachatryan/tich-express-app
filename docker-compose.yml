services:
  mongodb:
    image: mongo:7
    container_name: mongodb_container
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: express_app_container
    restart: always
    ports:
      - "3000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://admin:password@mongodb:27017/myapp?authSource=admin
      JWT_SECRET: mysecretkey
    depends_on:
      - mongodb

volumes:
  mongo_data:
